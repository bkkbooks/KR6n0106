body:
  text: 天親菩薩造三藏法師玄奘譯蕅益沙門智旭解此於瑜伽師地論本地分第一中略録名數而名為大乘百法明門者蓋小乘立七十五法但明補特伽羅無我猶妄計有心外實法今大乘明此百法皆不離識不惟實我本空亦復實法非有若於一一法中照達二空則一一皆為大乘證理之門也如世尊言一切法無我何等一切法云何為無我此借聖言以徵起也法名軌持我名主宰今既言一切法無我須遍於一切法中通達二無我義也一切法者略有五種一者心法二者心所有法三者色法四者心不相應行法五者無為法法既稱為一切則何所不攝設欲廣說窮劫莫盡今以五位百法收之故名為略略雖五位已收一切世出世間假實色心主伴罄無不盡何者前之四位收世出世有為諸法第五無為收世出世無為法性就前四中前三是實第四是假就前三中前二是心第三是色就前二中初一是主第二是伴有主必有伴伴不離主有心必有色色不離心有實必有假假不離實有有為必有無為無為亦豈離有為而別有自性哉於此五位百法求所謂有情命者等了不可得是補特伽羅無我求所謂軌解任持者亦了不可得是法無我也一切最勝故與此相應故二所現影故三位差別故四所顯示故如是次第此申明百法列為五位之次第即顯離心別無自性故一切惟心而無實我實法也心法於一切法中最勝由其能為主故此能統一切法也心所有法即與此心相應故不離心也色法即是心及心所二者所現之影故不離心及心所也不相應行即是依於心心所色三者之分位差別而假立故不離心心所色也無為法即是心心所色不相應行四有為法所顯示故亦與四有為法不一不異也第一心法略有八種一眼識二耳識三鼻識四舌識五身識六意識七末那識八阿賴耶識心性離過絶非尚不可名之為一云何有八若論相用浩然無涯今就有情分中相用最顯著者略有八種依於眼根了別色塵名為眼識依于耳根了別聲塵名為耳識依於鼻根了別香臭名為鼻識依於舌根了別滋味名為舌識依於身根了別痛癢寒熱等觸名為身識依於意根遍了五塵亦能分別落謝影子亦能通緣過去未來名為意識前五識所依五根皆是淨色此第六識所依意根則是心法此之意根從無始來內緣第八識之見分虗妄執為實我實法故名為末那識梵語末那此翻為意由其恆審思量為性相故然前六識時起時滅喻如水波第七末那無始相續妄執我法喻如水流阿賴耶識則喻如水梵語阿賴耶此翻為藏具有能藏所藏執藏三義若無此識則根身是誰執受器界是誰變現一切善惡漏無漏種是誰攝受且如吾人疲倦熟睡夢想俱無之時前六轉識俱不現起若無此識豈不同於死人既無夢無想仍非死人驗知必有此第八識與第七識微細我執仍自俱轉然此第八識決非實我實法若是實我實法則應常無變易而此識者乃從先世引業所招名異熟果既從業招便非常住又善業則感天人樂報惡業則感三塗苦報往來六道猶如車輪變形易貌曾無一定豈是實我實法哉第二心所有法略有五十一種分為六位一遍行有五二別境有五三善有十一四煩惱有六五隨煩惱有二十六不定有四心所有法亦名心數與心相應如臣隨王如僕隨主故名心所也此應甚多今略明六位五十一者舉相用之最著者言耳一遍行五者一作意二觸三受四想五思具四一切名為遍行謂遍於善惡無記三性遍於三界九地遍於有漏無漏世出世時遍與八識心王相應也一作意者警覺心種令起現行以為體性引現起心趣所緣境以為業用二觸者于根境識三和之時令心心所觸境以為體性受想思等所依以為業用三受者領納順違非順非違境相以為體性起於欲合欲離欲不合不離之愛以為業用四想者於境取像以為體性施設種種名言以為業用五思者令心造作以為體性於善惡無記之事役心以為業用二別境五者一欲二勝解三念四三麼地五慧所緣境事多分不同緣別別境而得生故名為別境一欲者於所樂境希求冀望以為體性精勤依此而生以為業用二勝解者於決定非猶豫境印可任持而為體性不可以他緣引誘改轉而為業用三念者於過去曾習之境令心明審記憶不忘而為體性定之所依而為業用四三麼地者此翻為定於所觀境令心專注不散而為體性智依此生而為業用五慧者于所觀境簡別決擇而為體性斷疑而為業用三善十一者一信二精進三慚四愧五無貪六無瞋七無癡八輕安九不放逸十行捨十一不害能為此世他世順益故名為善一信者於實德能深忍樂欲心淨而為體性對治不信樂求善法而為業用謂于諸法實事理中深信其為實有而隨順忍可復於三寶真淨德中深信而生喜樂又於一切世出世善深信其有力能得樂果能成聖道而起希望之欲由斯對治不信實德能之惡心愛樂證修世出世善二精進者于斷惡修善事中勇猛強悍而為體性對治懈怠成滿善事而為業用三慚者依于自身及法生于尊貴增上由斯崇尚敬重賢善羞耻過惡而不敢為以為體性別則對治無慚通則息諸惡行以為業用四愧者依于世間他人訶厭增上輕拒暴惡由此羞耻過罪而不敢為以為體性別則對治無愧通亦息諸惡行以為業用五無貪者于三有及三有資具無所染著而為體性別則對治貪著通則能作衆善以為業用六無瞋者於三苦及三苦資具無所憎恚而為體性別則對治瞋恚通則能作衆善以為業用七無癡者于諸諦理及諸實事明解而為體性別則對治愚癡通則能作衆善以為業用八輕安者遠離粗重雜染法品調暢身心於善法中堪任修持而為體性對治沉轉捨染濁身心轉得清淨身心而為業用九不放逸者即精進及無貪無瞋無癡三種善根於所斷惡防令不生於所修善修令增長而為體性對治放逸成滿一切世出世間善事而為業用十行捨者亦即精進及三善根能令其心平等正直無功用住而為體性對治掉舉寂靜而住以為業用此與五受中之捨受不同故名行捨十一不害者於諸有情不為侵損逼惱即以無瞋而為體性能對治害悲傷憐愍以為業用無瞋名慈不害名悲與樂拔苦度生勝用故體雖一約用分二四煩惱六者一貪二瞋三慢四無明五疑六不正見煩躁擾動惱亂身心故名煩惱一貪者於有有具染著為性能障無貪善根生苦為業二瞋者於苦苦具憎恚為性能障無瞋善根不安隱性惡行所依為業三慢者恃己所長於他有情心生高舉為性能障不慢生苦為業四無明者亦名為癡於諸理事迷暗為性能障無癡善根一切雜染所依為業五疑者於諸諦理猶豫為性能障不疑及諸善品為業六不正見者亦名惡見於諸諦理顛倒推求染慧為性能障善見招苦為業復有五種一薩迦耶見薩迦耶義翻積聚亦名身見謂於五蘊執我我所一切見趣所依為業二邊執見謂即於身見隨執斷常障出離行為業三見取謂於諸見之中隨執一見及所依蘊執為最勝能得清淨一切鬬諍所依為業四戒禁取謂於隨順諸見之戒禁及所依蘊執為最勝能得清淨無利勤苦所依為業五邪見謂謗無因果謗無作用謗無實事及非前四所攝諸餘邪執皆此邪見所攝五隨煩惱二十者一忿二恨三惱四覆五誑六諂七憍八害九嫉十慳十一無慚十二無愧十三不信十四懈怠十五放逸十六昏沉十七掉舉十八失念十九不正知二十散亂或無別體惟是煩惱分位差別或有別體性是煩惱同等流類故名為隨煩惱一忿者依對現前逆境憤發為性能障不忿執仗為業此即瞋恚一分為體二恨者由忿為先懷惡不捨結怨為性能障不恨熱惱為業此亦瞋恚一分為體三惱者忿恨為先追念往惡觸現逆境暴熱狠戾為性能障不惱多發凶鄙粗言蜇螫於他為業此亦瞋恚一分為體四覆者於自作罪恐失利養名譽隱藏為性能障不覆悔惱為業謂覆罪者後必悔惱不安隱故此以貪癡一分為體恐失現在利譽是貪不懼當來苦果是癡也五誑者為獲利譽矯現有德詭詐為性能障不誑邪命為業此亦貪癡一分為體六諂者為罔他故矯設異儀險曲為性能障不諂不任師友真正教誨為業此亦貪癡一分為體七憍者於自盛事深生染著醉傲為性能障不憍生長雜染為業此以貪愛一分為體八害者於諸有情心無悲愍損惱為性能障不害逼惱為業此亦瞋恚一分為體九嫉者殉自名利不耐他榮妬忌為性能障不嫉憂戚為業此亦瞋恚一分為體十慳者耽著財法不能慧捨祕吝為性能障不慳鄙澀畜積為業此亦貪愛一分為體此十各別起故名為小隨煩惱十一無慚者不顧自法輕拒賢善為性能障礙慚生長惡行為業十二無愧者不顧世間崇重暴惡為性能障礙愧生長惡行為業此二遍不善故名為中隨煩惱十三不信者於實德能不忍樂欲心穢為性能障淨信懈怠所依為業十四懈怠者於斷惡修善事中懶惰為性能障精進增染為業設于染事而䇿勤者亦名懈怠退善法故十五放逸者於染不防於淨不修肆縱流蕩為性障不放逸增惡損善所依為業即以懈怠及貪瞋癡四法為體十六昏沉者令心於境無堪任為性能障輕安毗鉢舍那為業十七掉舉者令心於境不寂靜為性能障行捨奢摩他為業十八失念者於諸所緣不能明記為性能障正念散亂所依為業即以念及癡各一分為體十九不正知者於所觀境謬解為性能障正知多所毀犯為業此以慧及癡各一分為體二十散亂者於諸所緣令心流蕩為性能障正定惡慧所依為業此八遍於不善及有覆無記之二種染心故名為大隨煩惱六不定四者一睡眠二惡作三尋四伺不定是善不定是煩惱不定遍一切心不定遍一切地故名不定一睡眠者令身不自在心極暗昧略緣境界為性障觀為業二惡作者追悔為性障止為業三尋求者令心匆務急遽於意言境粗轉為性四伺察者令心匆務急遽於意言境細轉為性此二俱以安不安住身心分位所依為業並用思及慧之各一分為體思正慧助不深推度名之為尋慧正思助能深推度名之為伺第三色法略有十一種一眼二耳三鼻四舌五身六色七聲八香九味十觸十一法處所攝色心心所所變相分皆名為色今且約內五根外六塵故但略有十一種也眼耳鼻舌身五根皆第八識相分而各有二一者勝義五根即八識上色之功能以能發識比知是有非他人所能見知二者浮塵五根即勝義五根所依托處乃四大之所合成衆生妄計以為我身實與外之地水火風無二無別均是第八識相分耳就此第八識所變依正二報之相眼識緣之即名為色此色即是眼識相分乃托第八識之相分以為本質自於識上變相而緣喻如鏡中之影未嘗親緣本質色也依正二報動則有聲耳識緣之自變聲相依正二報具香臭氣鼻識緣之自變香相依正二報具甜淡等六味舌識緣之自變味相依正二報具冷暖堅潤等觸身識緣之自變觸相五塵落謝影子并及表無表色定果色等惟是意識所緣相分名法處所攝色蓋法處所攝有二一者心法即五十一心所是也二者色法即意識所變相分是也然五十一箇心所亦各自變相分其所變相隨于心王攝入六塵故除此十一色法更無他色可得則知色惟心王心所二者所現之影明矣第四心不相應行法略有二十四種相應者和順之義今得及命根等二十四種非能緣故不與心及心所相應非質礙故不與色法相應有生滅故不與無為法相應故唯識論云非如色心及諸心所體相可得非異色心及諸心所作用可得由此故知定非實有但依色心及諸心所分位假立今直云心不相應行者雖依三法假立而色是心及心所之所現影心所又即與心相應故但言心明其總不離心也一得二命根三衆同分四異生性五無想定六滅盡定七無想報八名身九句身十文身十一生十二住十三老十四無常十五流轉十六定異十七相應十八勢速十九次第二十時二十一方二十二數二十三和合性二十四不和合性一得者依一切法造作成就假立二命根者依于色心連持不斷假立三衆同分者如人與人同天與天同依于彼此相似假立四異生性者妄計我法不與聖人二空智性相同依于聖凡相對假立五無想定者外道厭惡想心作意求滅功用淳熟令前六識心及心所一切不行惟第七識俱生我執與第八識仍在不離根身依此身心分位假立六滅盡定者三果以上聖人欲暫止息受想勞慮依於非想非非想定遊觀無漏以為加行乃得趣入入此定已前六識心及心所一切不行第七識俱生我執及彼心所亦皆不行惟第七識俱生法執與第八識仍在不離根身依此身心分位假立七無想報者外道修無想定既得成就捨此身後生在第四禪天五百劫中前六識心及彼心所長時不行惟有第七識俱生我執與第八識仍在攬彼第四禪中微細色質為身彼微細色即是第八識所變相分依此色心分位假立八名身者名詮諸法自性如眼耳等種種名字九句身者句詮諸法差別如眼無常耳無常等種種道理十文身者文即是字為名句之所依此三皆依色聲法塵分位假立若語言中所有名句及字即依聲立若書冊中所有名句及字即依色立若心想中所有名句文字即依法立此方眼耳意三種根識獨利故偏約三塵立名句文若他方餘根識利則香飯天衣等並可依之假立名句文三是故六塵皆為教經亦復皆為行經皆為理經也十一生者依于色心仗緣顯現假立十二住者依于色心暫時相似相續假立十三老者亦名為異依于色心遷變不停漸就衰異假立十四無常者亦名為滅依於色心暫有還無假立十五流轉者依於色心因果前後相續假立十六定異者依於善惡因果種子現行各各不同假立十七相應者依於心及心所和合俱起假立十八勢速者依於色心諸法遷流不暫停住假立十九次第者依於諸法前後引生庠序不亂假立二十時者依於色心剎那展轉假立故有日月年運長短差別二十一方者依于形質前後左右假立故有東西南北四維上下差別二十二數者依于諸法多少相仍相待假立故有一十百千乃至阿僧祗之差別二十三和合者依於諸法不相乖違假立二十四不和合者依於諸法互相乖違假立第五無為法者略有六種一虗空無為二擇滅無為三非擇滅無為四不動滅無為五想受滅無為六真如無為上之四種色心假實皆是生滅之法名有為性無此有為假名無為非更別有一箇無為之法在于有為法外而與有為相對待也故云但是四所顯示然為既無矣尚不名一云何有六正由是四所顯故不妨隨於能顯說有六別一虗空無為者非色非心離諸障礙無可造作故名無為二擇滅無為者正慧簡擇永滅煩惱所顯真理本不生滅故名無為三非擇滅無為者復有二種一者不由擇力本性清淨故名無為二者有為緣闕暫爾不生雖非永滅緣闕所顯故名無為四不動滅無為者入第四禪雙忘苦樂捨念清淨三災不到亦名無為五想受滅無為者入滅盡定想受不行似涅槃故亦名無為六真如無為者非妄名真非倒名如即是色心假實諸法之性諸法如波此性如水諸法如繩此性如麻諸法非此則無自體此離諸法亦無自相故與諸法不一不異惟有遠離遍計所執了達我法二空乃能證會本真本如之體真如二字亦是強名前五無為又皆依此假立此即唯識實性故皆唯識決無實我實法也上略明一切法竟言無我者略有二種一補特伽羅無我二法無我此正顯示一切法無我者即前五位百法之中一一推求皆無此二種我相也補特伽羅此云有情有情無我即生空也法無我即法空也且有情無我者于前五位之中若云心即是我則心且有八何心是我又一一心念念生滅前後無體現在不住以何為我若云心所是我則心所有五十一何等心所是我三際無性亦然若云色法是我則勝義五根不可現見浮塵五根與外色同生滅不停何當有我若云不相應行是我則色心有體尚不是我此依色心分位假立又豈是我若云無為是我對有說無有尚非我無豈成我故知五位百法決無真實補特伽羅可得也次法無我者依於俗諦假說心心所色不相應行種種差別約真諦觀毫不可得但如幻夢非有似有有即非有又對有為假說無為有為既虗無為豈實譬如依空顯現狂華華非生滅空豈有無是知五位百法總無實法無實法故名法無我也能於五位百法通達二無我理是為百法明門
